sites:
  # ── Tier 1: CSS selector sites (fast, no auth) ───────────────────────────
  # Indeed Japan - reliable, no login needed, good for MVP demo
  # BLOCKED: Cloudflare protects all endpoints including RSS and internal XHR.
  # To re-enable: add a residential proxy service (e.g. Oxylabs, Smartproxy)
  # and set mode: proxy_fetch with credentials in .env
  indeed_japan:
    active: false
    status_note: "blocked by Cloudflare on all endpoints including RSS — requires residential proxy or browser session, not viable on Render free tier"
    url: "https://jp.indeed.com/jobs?q=%E7%9C%8B%E8%AD%B7%E5%B8%AB&l=%E6%9D%B1%E4%BA%AC&limit=20"
    type: job_board
    mode: claude_fallback

  # ── Tier 2: Claude fallback sites ────────────────────────────────────────
  # Switched to claude_fallback due to updated URLs requiring flexible scraping
